<!DOCTYPE html>
<html lang="he" dir="rtl">


<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Task Manager</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<button class="dark-mode-btn" onclick="toggleDarkMode()">
    🌙 מצב לילה
</button>

<div class="gamification-container">

    <div class="level-badge">
        <span id="levelText">רמה 1</span>
    </div>

    <div class="points-bar-wrapper">
        <div class="points-bar-fill" id="pointsBarFill" style="width: 0%;">0 / 100</div>
        <span id="pointsText" class="points-counter"> </span>
    </div>
    <button id="resetLevelBtn" class="reset-level-btn" onclick="resetLevel()">אתחול רמה </button>
</div>


    <div class="container">

        <h1>המשימות שלי</h1>


        <div class="input-row">

            <select id ="priorityInput">
                <option value="medium" disabled selected hidden>רמת דחיפות</option>
                <option value="high">דחוף</option>
                <option value="medium">בינוני</option>
                <option value="low">לא דחוף</option>
            </select>


            <input type="text"
                   id="taskInput"
                   placeholder="כתוב משימה...">


            <button onclick="addTask()">
                הוספת משימה
            </button>


            <button onclick="clearTasks()">
                ניקוי רשימה
            </button>


        </div>


        <div class="filter-row">
    <button class="filter-btn active" onclick="filterTasks('all')">הכל</button>
    <button class="filter-btn" onclick="filterTasks('active')">ממתין לביצוע</button>
    <button class="filter-btn" onclick="filterTasks('completed')">הושלמו</button>
</div>


        <ul id="taskList"></ul>
                            <h2 id="taskCounter">נשארו לך עוד 0 משימות☺️</h2>

    </div>


    <div class="floating-tools">


<div class="floating-tools-right">


        <div class="side-card">
            <h3>טיימר</h3>
            <input type="number" id="timerInput" placeholder="Minutes">
            <p id="timerDisplay">00:00</p>
            <button onclick="startTimer()">Start</button>
            <button onclick="stopTimer()">Stop</button>
            <button onclick="resetTimer()">Reset</button>
        </div>


    </div>


    <div class="floating-tools-left">

<div class="side-card surprise-card">
        <p>הרשימה שלכם זקוקה למשימה קטנה וטובה שתעשה לכם את היום?</p>
    <button onclick="addSurpriseTask()">✨ תפתיע אותי!</button>
</div>

        
    <div class="side-card motivation-card"> 
        <h3>מוטיבציה</h3>
    <p id="quoteDisplay"></p>
    <button onclick="generateQuote()">תן לי מוטיבציה</button>
</div>

    </div>


    </div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="js/script.js"></script>

</body>



</html>
